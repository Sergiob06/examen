name: Deploy HTML

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Desplegar proyecto
      run: |
        mkdir -p "${{ secrets.DEPLOY_PATH }}"
        cp index.html "${{ secrets.DEPLOY_PATH }}"
        echo "Despliegue completado"
